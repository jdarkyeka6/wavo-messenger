<!DOCTYPE html>
<html>
<head>
    <title>Wavo Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* Auth Container */
        .auth-container, .chat-container {
            width: 900px;
            max-width: 95%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        
        .auth-box {
            max-width: 400px;
            margin: 0 auto;
            padding: 50px 40px;
        }
        
        .auth-box h1 {
            font-size: 32px;
            color: #075e54;
            margin-bottom: 10px;
        }
        
        .auth-box .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .auth-box input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 14px;
            outline: none;
        }
        
        .auth-box input:focus {
            border-color: #075e54;
        }
        
        .auth-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }
        
        .auth-switch {
            text-align: center;
            color: #666;
            cursor: pointer;
        }
        
        .auth-switch span {
            color: #075e54;
            font-weight: 600;
        }
        
        /* Chat Container */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            color: white;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h2 { font-size: 18px; }
        .chat-header p { font-size: 11px; opacity: 0.8; margin-top: 5px; }
        
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #e5ddd5;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            display: flex;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-mine {
            justify-content: flex-end;
        }
        
        .message-theirs {
            justify-content: flex-start;
        }
        
        .bubble {
            max-width: 65%;
            padding: 10px 14px;
            border-radius: 18px;
        }
        
        .message-mine .bubble {
            background: #dcf8c5;
            border-bottom-right-radius: 4px;
        }
        
        .message-theirs .bubble {
            background: white;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .message-name {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #075e54;
        }
        
        .message-text {
            font-size: 14px;
            line-height: 1.4;
        }
        
        .message-time {
            font-size: 10px;
            color: #888;
            margin-top: 5px;
            text-align: right;
        }
        
        .input-area {
            background: white;
            padding: 15px 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #ddd;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e1e8ed;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        
        .input-area input:focus {
            border-color: #075e54;
        }
        
        .input-area button {
            padding: 12px 28px;
            background: #075e54;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .online-count {
            font-size: 11px;
            padding: 8px 16px;
            background: #f8f9fa;
            border-bottom: 1px solid #e1e8ed;
            color: #666;
        }
        
        .footer {
            font-size: 10px;
            text-align: center;
            padding: 8px;
            background: #f0f0f0;
            color: #666;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: -10px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        ::-webkit-scrollbar {
            width: 5px;
        }
        
        ::-webkit-scrollbar-track {
            background: #ddd;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <!-- Auth Container -->
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h1>💬 Wavo</h1>
            <div class="subtitle">Private messaging. Simple.</div>
            
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Username">
                <input type="password" id="loginPassword" placeholder="Password">
                <div id="loginError" class="error-message"></div>
                <button onclick="login()">Log In →</button>
                <div class="auth-switch" onclick="showSignup()">
                    Don't have an account? <span>Sign up</span>
                </div>
            </div>
            
            <div id="signupForm" style="display: none;">
                <input type="text" id="signupUsername" placeholder="Username (min 3 chars)">
                <input type="password" id="signupPassword" placeholder="Password (min 4 chars)">
                <div id="signupError" class="error-message"></div>
                <button onclick="signup()">Create Account →</button>
                <div class="auth-switch" onclick="showLogin()">
                    Already have an account? <span>Log in</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Chat Container -->
    <div id="chatContainer" class="chat-container" style="display: none;">
        <div class="chat-header">
            <div>
                <h2>💬 Wavo Messenger</h2>
                <p id="userInfo">Logged in as...</p>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div class="online-count" id="onlineCount">💬 Everyone can see your messages</div>
        <div class="messages-area" id="messagesArea">
            <div style="text-align:center; color:#888; padding:40px;">✨ No messages yet. Say hello!</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." disabled>
            <button id="sendBtn" disabled>Send →</button>
        </div>
        <div class="footer">
            📁 All messages saved to your laptop | Users saved to users.json
        </div>
    </div>
    
    <script>
        let currentUser = null;
        let messageInterval = null;
        
        async function signup() {
            const username = document.getElementById('signupUsername').value.trim();
            const password = document.getElementById('signupPassword').value;
            const errorDiv = document.getElementById('signupError');
            
            errorDiv.textContent = '';
            
            if (!username || username.length < 3) {
                errorDiv.textContent = 'Username must be at least 3 characters';
                return;
            }
            if (!password || password.length < 4) {
                errorDiv.textContent = 'Password must be at least 4 characters';
                return;
            }
            
            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await response.json();
            
            if (data.success) {
                alert('Account created! Please log in.');
                showLogin();
                document.getElementById('loginUsername').value = username;
                document.getElementById('loginPassword').value = '';
            } else {
                errorDiv.textContent = data.error;
            }
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            errorDiv.textContent = '';
            
            if (!username || !password) {
                errorDiv.textContent = 'Please enter username and password';
                return;
            }
            
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await response.json();
            
            if (data.success) {
                currentUser = data.username;
                document.getElementById('userInfo').innerHTML = `Logged in as ${currentUser}`;
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('messageInput').focus();
                
                // Load messages
                await loadMessages();
                messageInterval = setInterval(loadMessages, 2000);
            } else {
                errorDiv.textContent = data.error;
            }
        }
        
        async function logout() {
            if (currentUser) {
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser })
                });
            }
            
            if (messageInterval) clearInterval(messageInterval);
            currentUser = null;
            document.getElementById('chatContainer').style.display = 'none';
            document.getElementById('authContainer').style.display = 'block';
            document.getElementById('loginPassword').value = '';
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentUser) return;
            
            const response = await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser, text: text })
            });
            
            const data = await response.json();
            
            if (data.success) {
                input.value = '';
                await loadMessages();
            }
        }
        
        async function loadMessages() {
            const response = await fetch('/api/messages');
            const messages = await response.json();
            displayMessages(messages);
        }
        
        function displayMessages(messages) {
            const container = document.getElementById('messagesArea');
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#888; padding:40px;">✨ No messages yet. Say hello!</div>';
                return;
            }
            
            container.innerHTML = '';
            messages.forEach(msg => {
                const isMine = msg.username === currentUser;
                const div = document.createElement('div');
                div.className = `message ${isMine ? 'message-mine' : 'message-theirs'}`;
                div.innerHTML = `
                    <div class="bubble">
                        <div class="message-name">${escapeHtml(msg.username)}</div>
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.getElementById('signupError').textContent = '';
        }
        
        function showLogin() {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('loginError').textContent = '';
        }
        
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
    </script>
</body>
</html>
